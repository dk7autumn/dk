<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鱼类管理 - 水产店售卖记录系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .nav { display: flex; gap: 15px; margin-bottom: 20px; }
        .nav a { background: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
        .nav a:hover { background: #2980b9; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h2 { margin-bottom: 15px; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #34495e; color: white; }
        tr:hover { background: #f5f5f5; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #2c3e50; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .actions { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>水产店售卖记录系统</h1>
        </div>
        <div class="nav">
            <a th:href="@{/fish}" class="active">鱼类管理</a>
            <a th:href="@{/sales}">售卖记录</a>
            <a th:href="@{/sales/stats}">统计报表</a>
        </div>

        <div class="card">
            <h2>添加/编辑鱼类</h2>
            <form th:action="@{/fish/add}" method="post" th:object="${fish}">
                <input type="hidden" th:field="*{id}"/>
                <div class="form-group">
                    <label>名称</label>
                    <input type="text" th:field="*{name}" required placeholder="输入鱼类名称"/>
                </div>
                <div class="form-group">
                    <label>价格 (元/斤)</label>
                    <input type="number" step="0.01" th:field="*{price}" required placeholder="输入价格"/>
                </div>
                <div class="form-group">
                    <label>产地</label>
                    <input type="text" th:field="*{origin}" placeholder="输入产地"/>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <input type="text" th:field="*{description}" placeholder="输入描述"/>
                </div>
                <button type="submit" class="btn btn-success">保存</button>
            </form>
        </div>

        <div class="card">
            <h2>鱼类列表</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>价格</th>
                        <th>产地</th>
                        <th>描述</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="fish : ${fishList}">
                        <td th:text="${fish.id}"></td>
                        <td th:text="${fish.name}"></td>
                        <td th:text="'¥' + ${fish.price}"></td>
                        <td th:text="${fish.origin}"></td>
                        <td th:text="${fish.description}"></td>
                        <td>
                            <a th:href="@{/fish/edit/{id}(id=${fish.id})}" class="btn btn-primary">编辑</a>
                            <a th:href="@{/fish/delete/{id}(id=${fish.id})}" class="btn btn-danger"
                               onclick="return confirm('确定删除吗？')">删除</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
