<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计报表 - 水产店售卖记录系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .nav { display: flex; gap: 15px; margin-bottom: 20px; }
        .nav a { background: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
        .nav a:hover { background: #2980b9; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h2 { margin-bottom: 15px; color: #2c3e50; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 10px; text-align: center; }
        .stat-box h3 { font-size: 2em; margin-bottom: 10px; }
        .stat-box p { opacity: 0.9; }
        .form-inline { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #2c3e50; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; min-width: 200px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 14px; }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .section { margin-bottom: 30px; }
        .section h3 { color: #2c3e50; margin-bottom: 15px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>水产店售卖记录系统</h1>
        </div>
        <div class="nav">
            <a th:href="@{/fish}">鱼类管理</a>
            <a th:href="@{/sales}">售卖记录</a>
            <a th:href="@{/sales/stats}" class="active">统计报表</a>
        </div>

        <div class="card section">
            <h3>每日统计</h3>
            <form th:action="@{/sales/stats/daily}" method="get" class="form-inline">
                <div class="form-group">
                    <label>选择日期</label>
                    <input type="date" name="date" required th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}"/>
                </div>
                <button type="submit" class="btn btn-primary">查询</button>
            </form>
        </div>

        <div class="card section">
            <h3>每周统计</h3>
            <form th:action="@{/sales/stats/weekly}" method="get" class="form-inline">
                <div class="form-group">
                    <label>选择日期</label>
                    <input type="date" name="date" required th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}"/>
                </div>
                <button type="submit" class="btn btn-primary">查询</button>
            </form>
        </div>

        <div class="card section">
            <h3>每月统计</h3>
            <form th:action="@{/sales/stats/monthly}" method="get" class="form-inline">
                <div class="form-group">
                    <label>选择日期</label>
                    <input type="date" name="date" required th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}"/>
                </div>
                <button type="submit" class="btn btn-primary">查询</button>
            </form>
        </div>

        <div class="card section">
            <h3>每季度统计</h3>
            <form th:action="@{/sales/stats/quarterly}" method="get" class="form-inline">
                <div class="form-group">
                    <label>选择日期</label>
                    <input type="date" name="date" required th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}"/>
                </div>
                <button type="submit" class="btn btn-primary">查询</button>
            </form>
        </div>

        <div class="card section">
            <h3>每年统计</h3>
            <form th:action="@{/sales/stats/yearly}" method="get" class="form-inline">
                <div class="form-group">
                    <label>选择年份</label>
                    <input type="number" name="year" required th:value="${#dates.format(#dates.createNow(), 'yyyy')}"/>
                </div>
                <button type="submit" class="btn btn-primary">查询</button>
            </form>
        </div>
    </div>
</body>
</html>
