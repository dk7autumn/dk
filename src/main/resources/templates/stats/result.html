<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计结果 - 水产店售卖记录系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .nav { display: flex; gap: 15px; margin-bottom: 20px; }
        .nav a { background: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
        .nav a:hover { background: #2980b9; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h2 { margin-bottom: 15px; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #34495e; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 20px 0; }
        .stat-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; border-radius: 10px; text-align: center; }
        .stat-box h3 { font-size: 1.8em; margin-bottom: 8px; }
        .stat-box p { opacity: 0.9; font-size: 0.9em; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #3498db; color: white; }
        .back-link { display: inline-block; margin-bottom: 15px; color: #3498db; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>水产店售卖记录系统</h1>
        </div>
        <div class="nav">
            <a th:href="@{/fish}">鱼类管理</a>
            <a th:href="@{/sales}">售卖记录</a>
            <a th:href="@{/sales/stats}" class="active">统计报表</a>
        </div>

        <a th:href="@{/sales/stats}" class="back-link">← 返回统计页面</a>

        <div class="card">
            <h2 th:text="${statType} + '统计结果'"></h2>
            <p th:if="${statType == '每日'}">日期：<span th:text="${date}"></span></p>
            <p th:if="${statType == '每周'}">周次：<span th:text="${stats.startDate}"></span> 至 <span th:text="${stats.endDate}"></span></p>
            <p th:if="${statType == '每月'}">月份：<span th:text="${stats.startDate}"></span> 至 <span th:text="${stats.endDate}"></span></p>
            <p th:if="${statType == '每季度'}">季度：第 <span th:text="${stats.quarter}"></span> 季度 (<span th:text="${stats.startDate}"></span> 至 <span th:text="${stats.endDate}"></span>)</p>
            <p th:if="${statType == '每年'}">年份：<span th:text="${stats.year}"></span></p>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <h3 th:text="${stats.totalRecords}"></h3>
                <p>记录总数</p>
            </div>
            <div class="stat-box">
                <h3 th:text="${stats.totalQuantity} + ' 斤'"></h3>
                <p>总售卖量</p>
            </div>
            <div class="stat-box">
                <h3 th:text="'¥' + ${stats.totalAmount}"></h3>
                <p>总销售额</p>
            </div>
        </div>

        <div class="card">
            <h2>售卖明细</h2>
            <table th:if="${not #lists.isEmpty(stats.records)}">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>鱼类</th>
                        <th>单价</th>
                        <th>数量</th>
                        <th>总金额</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="record : ${stats.records}">
                        <td th:text="${record.saleDate}"></td>
                        <td th:text="${record.fish.name}"></td>
                        <td th:text="'¥' + ${record.fish.price}"></td>
                        <td th:text="${record.quantity} + ' 斤'"></td>
                        <td th:text="'¥' + ${record.totalPrice}"></td>
                    </tr>
                </tbody>
            </table>
            <p th:if="${#lists.isEmpty(stats.records)}" style="text-align: center; color: #999; padding: 30px;">暂无数据</p>
        </div>
    </div>
</body>
</html>
