server:
  port: 8080

spring:
  application:
    name: sale-system
  datasource:
    url: jdbc:mysql://localhost:3306/sale_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: dk-sale-system-jwt-secret-key-2024-spring-boot-application
  expiration: 86400000 # 24 hours
